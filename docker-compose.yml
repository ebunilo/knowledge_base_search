name: kb-search

# =============================================================================
#  Enterprise Knowledge Base Search deployment
#  -- App (FastAPI/uvicorn), Qdrant (vector DB), Postgres (doc store), Redis
#  -- Optional TEI for local bulk embeddings (profile: ingestion)
#
#  Security posture:
#   * All ports bind to 127.0.0.1 only -- NEVER exposed to the public internet
#   * Every service still requires credentials (defense in depth)
#   * Services talk to each other over the private 'kb-net' network by name
#   * Credentials are read from the repo-root .env file
#
#  Usage:
#     docker compose up -d --build --wait         # app + core data plane
#     docker compose --profile ingestion up -d    # + local TEI for bulk embeddings
#     docker compose down                          # stop (volumes persist)
#     docker compose down -v                       # stop and wipe all data
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kb-search-app:latest
    container_name: kb-app
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Internal service-to-service routing inside Docker network.
      QDRANT_URL: http://qdrant:6333
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379/0
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-8765}:8765"
    command: >
      uvicorn kb.web.app:app --host 0.0.0.0 --port 8765
    networks:
      - kb-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/health', timeout=3).read()\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: kb-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"   # HTTP / REST
      - "127.0.0.1:6334:6334"   # gRPC
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      QDRANT__TELEMETRY_DISABLED: "true"
      QDRANT__LOG_LEVEL: INFO
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - kb-net
    healthcheck:
      # /readyz requires no auth; confirms the service is accepting requests
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: kb-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    networks:
      - kb-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: kb-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - kb-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} --no-auth-warning PING | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Optional: local bulk embeddings for ingestion.
  # Enable with: docker compose --profile ingestion up -d
  # CPU-only by default; switch image tag for GPU if the host has one.
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    container_name: kb-tei
    restart: unless-stopped
    profiles: ["ingestion"]
    ports:
      - "127.0.0.1:8080:80"
    command:
      - --model-id=BAAI/bge-m3
      - --port=80
      - --max-batch-tokens=16384
    environment:
      HF_API_TOKEN: ${HF_API_TOKEN}
      HUGGING_FACE_HUB_TOKEN: ${HF_API_TOKEN}
    volumes:
      - tei_cache:/data
    networks:
      - kb-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s   # first boot pulls the model (~2GB)

volumes:
  qdrant_data:
  postgres_data:
  redis_data:
  tei_cache:

networks:
  kb-net:
    driver: bridge
